name: raj_staff_app
description: Mobile application for Raj Electronics warehouse staff for inward/outward scanning.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management & DI
  flutter_bloc: ^8.1.5
  get_it: ^7.6.7
  equatable: ^2.0.5
  go_router: ^14.0.0

  # Network
  dio: ^5.4.3
  connectivity_plus: ^6.0.3
  supabase_flutter: ^2.5.0

  # Storage
  flutter_secure_storage: ^9.0.0
  sqflite: ^2.3.3
  path_provider: ^2.1.3

  # UI & Utilities
  google_fonts: ^6.2.1
  vibration: ^2.0.1
  intl: ^0.19.0
  permission_handler: ^11.3.1
  lottie: ^3.1.2

  # Scanner & PDF
  mobile_scanner: ^5.1.0
  printing: ^5.11.1
  pdf: ^3.10.7
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
